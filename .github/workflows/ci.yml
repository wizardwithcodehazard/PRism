name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # Backend: Python / FastAPI
  # ─────────────────────────────────────────────
  backend:
    name: Backend (FastAPI)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio httpx anyio

      - name: Lint (ruff)
        run: |
          pip install ruff
          ruff check . --select E,F,W --ignore E501

      - name: Run tests
        env:
          GITHUB_CLIENT_ID: test_id
          GITHUB_CLIENT_SECRET: test_secret
          GROQ_API_KEY: test_key
          SECRET_KEY: test_secret_key
          DATABASE_URL: sqlite+aiosqlite:///./test.db
          FRONTEND_URL: http://localhost:3000
        run: pytest tests/ -v --tb=short

  # ─────────────────────────────────────────────
  # Frontend: Next.js
  # ─────────────────────────────────────────────
  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: https://placeholder.onrender.com
        run: npm run build

  # ─────────────────────────────────────────────
  # Dynamic Language Detection Test
  # Runs additional language-specific linting when
  # certain file types are detected in the diff.
  # ─────────────────────────────────────────────
  detect-and-lint:
    name: Language-Aware Linting
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed file types
        id: detect
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          echo "Changed files:"
          echo "$CHANGED"

          # Detect languages present in the diff
          HAS_PY=$(echo "$CHANGED" | grep -qE '\.py$' && echo "true" || echo "false")
          HAS_JS=$(echo "$CHANGED" | grep -qE '\.(js|jsx|mjs|cjs)$' && echo "true" || echo "false")
          HAS_TS=$(echo "$CHANGED" | grep -qE '\.(ts|tsx)$' && echo "true" || echo "false")
          HAS_GO=$(echo "$CHANGED" | grep -qE '\.go$' && echo "true" || echo "false")
          HAS_JAVA=$(echo "$CHANGED" | grep -qE '\.java$' && echo "true" || echo "false")
          HAS_DOCKER=$(echo "$CHANGED" | grep -qiE '(Dockerfile|docker-compose)' && echo "true" || echo "false")
          HAS_TF=$(echo "$CHANGED" | grep -qE '\.tf$' && echo "true" || echo "false")

          echo "has_python=$HAS_PY" >> $GITHUB_OUTPUT
          echo "has_js=$HAS_JS" >> $GITHUB_OUTPUT
          echo "has_ts=$HAS_TS" >> $GITHUB_OUTPUT
          echo "has_go=$HAS_GO" >> $GITHUB_OUTPUT
          echo "has_java=$HAS_JAVA" >> $GITHUB_OUTPUT
          echo "has_docker=$HAS_DOCKER" >> $GITHUB_OUTPUT
          echo "has_terraform=$HAS_TF" >> $GITHUB_OUTPUT

      # Python
      - name: Lint Python (ruff + mypy)
        if: steps.detect.outputs.has_python == 'true'
        run: |
          pip install ruff mypy
          ruff check . --select E,F,W --ignore E501 || true
          echo "Python lint completed"

      # JavaScript / TypeScript
      - name: Lint JS/TS (ESLint)
        if: steps.detect.outputs.has_js == 'true' || steps.detect.outputs.has_ts == 'true'
        run: |
          if [ -f frontend/package.json ]; then
            cd frontend && npm ci --silent && npm run lint || true
          fi
          echo "JS/TS lint completed"

      # Go
      - name: Lint Go (golangci-lint)
        if: steps.detect.outputs.has_go == 'true'
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          skip-pkg-cache: true
        continue-on-error: true

      # Dockerfile
      - name: Lint Dockerfiles (hadolint)
        if: steps.detect.outputs.has_docker == 'true'
        uses: hadolint/hadolint-action@v3.1.0
        with:
          recursive: true
          failure-threshold: warning
        continue-on-error: true

      # Terraform
      - name: Lint Terraform (tflint)
        if: steps.detect.outputs.has_terraform == 'true'
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest
        continue-on-error: true

      - name: Summary
        run: |
          echo "## Language Detection Results" >> $GITHUB_STEP_SUMMARY
          echo "| Language | Detected |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|----------|" >> $GITHUB_STEP_SUMMARY
          echo "| Python | ${{ steps.detect.outputs.has_python }} |" >> $GITHUB_STEP_SUMMARY
          echo "| JavaScript | ${{ steps.detect.outputs.has_js }} |" >> $GITHUB_STEP_SUMMARY
          echo "| TypeScript | ${{ steps.detect.outputs.has_ts }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Go | ${{ steps.detect.outputs.has_go }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker | ${{ steps.detect.outputs.has_docker }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Terraform | ${{ steps.detect.outputs.has_terraform }} |" >> $GITHUB_STEP_SUMMARY
